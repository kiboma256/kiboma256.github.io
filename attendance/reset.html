<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reset Password</title>
    <link rel="stylesheet" type="text/css" href="css/index.css">
</head>
<body>

<div class="main">
    <div class="logo">
        <img src="assets/logo.png" alt="logo" width="100%">
    </div>
    <div class="card">
        <h2>Reset Password</h2>
        <p id="message">A reset link will be sent if you exist in our database.</p>
        <form id="resetForm">
            <div class="form-group">
                <label>Enter Email</label>
                <input type="email" id="resetEmail" placeholder="example@gmail.com" required>
            </div>
            <button type="submit" class="btn-primary" id="sendResetBtn">Send Reset Link</button>
            <button type="button" class="btn-register"><a href="index.html">Back to Login</a></button>
        </form>
    </div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/8.2.5/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.2.5/firebase-auth.js"></script>

<!-- Your Firebase config (must initialize auth) -->
<script src="JS/config.js"></script>

<!-- Reset logic -->
<script>
    const resetForm = document.getElementById('resetForm');
    const emailInput = document.getElementById('resetEmail');
    const messagePara = document.getElementById('message');

    resetForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = emailInput.value.trim();
        if (!email) {
            messagePara.innerText = 'Please enter your email address.';
            return;
        }

        // Disable button to prevent multiple clicks
        const btn = document.getElementById('sendResetBtn');
        btn.disabled = true;
        btn.innerText = 'Sending...';

        try {
            await firebase.auth().sendPasswordResetEmail(email);
            messagePara.style.color = 'green';
            messagePara.innerText = '✅ Reset link sent! Check your email (spam folder too).';
            emailInput.value = ''; // clear
        } catch (error) {
            console.error(error);
            messagePara.style.color = 'red';
            // Show user-friendly message (don't expose internal errors)
            if (error.code === 'auth/user-not-found') {
                messagePara.innerText = '❌ No account found with that email.';
            } else {
                messagePara.innerText = '❌ Error: ' + error.message;
            }
        } finally {
            btn.disabled = false;
            btn.innerText = 'Send Reset Link';
        }
    });
</script>

</body>
</html>
